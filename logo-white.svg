<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Speech bubble body -->
  <rect x="20" y="20" width="160" height="130" rx="22" ry="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="5"/>

  <!-- Bubble tail -->
  <polygon points="40,148 70,148 48,175" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linejoin="round"/>

  <!-- Terminal prompt: > -->
  <text x="38" y="102" font-family="monospace" font-size="52" font-weight="700" fill="rgba(255,255,255,0.5)">></text>

  <!-- Cursor block -->
  <rect x="88" y="68" width="30" height="48" rx="4" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
