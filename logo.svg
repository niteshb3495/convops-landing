<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Speech bubble body -->
  <rect x="20" y="20" width="160" height="130" rx="22" ry="22" fill="url(#grad)" />

  <!-- Bubble tail -->
  <polygon points="40,148 70,148 48,175" fill="url(#grad)" />

  <!-- Terminal prompt: > -->
  <text x="38" y="102" font-family="monospace" font-size="52" font-weight="700" fill="rgba(255,255,255,0.5)">></text>

  <!-- Cursor block -->
  <rect x="88" y="68" width="30" height="48" rx="4" fill="#ffffff" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.2;0.95" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
